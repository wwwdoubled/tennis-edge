name: Update tennis data

on:
  schedule:
    # Every day at 06:00 UTC (07:00 Lisbon in winter, 08:00 in summer)
    - cron: "0 6 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scripts.update_data
